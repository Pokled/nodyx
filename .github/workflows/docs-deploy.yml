name: Deploy nodyx-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'nodyx-docs/**'
      - '.github/workflows/docs-deploy.yml'

# Ce workflow lit les secrets VPS_HOST / VPS_USER / VPS_SSH_KEY pour pousser
# le déploiement par SSH. Aucun besoin d'écrire au repo : permission
# minimale pour réduire la surface en cas de compromission de l'action SSH
# tierce (scénario tj-actions/changed-files mars 2025).
permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to nodyx.dev
    runs-on: ubuntu-latest

    steps:
      # appleboy/ssh-action est une action communautaire (pas official GitHub).
      # Elle a accès direct aux secrets VPS_*. Pin par SHA strict : si appleboy
      # se fait pwn et retaggue v1.2.0 vers un commit malveillant qui exfiltre
      # les secrets, nos secrets restent protégés tant qu'on ne bumpe pas le
      # SHA manuellement.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -euo pipefail

            cd /var/www/nexus

            echo "── git pull ──"
            git pull origin main

            echo "── npm install ──"
            cd nodyx-docs
            npm ci --prefer-offline

            echo "── build ──"
            npm run build

            echo "── restart ──"
            sudo -u nodyx PM2_HOME=/home/nodyx/.pm2 pm2 restart nodyx-docs

            echo "── done ──"
            sudo -u nodyx PM2_HOME=/home/nodyx/.pm2 pm2 show nodyx-docs | grep -E "status|restart"
